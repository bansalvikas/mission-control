<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="4" fill="#0a0a0f"/>
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="12" stroke="#00ff88" stroke-width="1" fill="none" opacity="0.3"/>
  <!-- Middle ring -->
  <circle cx="16" cy="16" r="7" stroke="#00ff88" stroke-width="1" fill="none" opacity="0.6"/>
  <!-- Crosshair lines (gaps leave space around center) -->
  <line x1="16" y1="4"  x2="16" y2="9"  stroke="#00ff88" stroke-width="1" opacity="0.7"/>
  <line x1="16" y1="23" x2="16" y2="28" stroke="#00ff88" stroke-width="1" opacity="0.7"/>
  <line x1="4"  y1="16" x2="9"  y2="16" stroke="#00ff88" stroke-width="1" opacity="0.7"/>
  <line x1="23" y1="16" x2="28" y2="16" stroke="#00ff88" stroke-width="1" opacity="0.7"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2" fill="#00ff88"/>
</svg>
